name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: |
          set -euo pipefail

          mkdir -p build dist

          binary="llm-usage"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            binary="${binary}.exe"
          fi

          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags="-s -w" -o "build/${binary}" .

          asset_base="llm-usage_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            (cd build && zip "../dist/${asset_base}.zip" "${binary}")
            exit 0
          fi

          tar -C build -czf "dist/${asset_base}.tar.gz" "${binary}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-usage_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  homebrew:
    name: Publish Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: rselbach/homebrew-tap
          token: ${{ secrets.HOMEBREW_PAT }}
          path: homebrew-tap

      - name: Update formula
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          release_base="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          darwin_amd64="llm-usage_${GITHUB_REF_NAME}_darwin_amd64.tar.gz"
          darwin_arm64="llm-usage_${GITHUB_REF_NAME}_darwin_arm64.tar.gz"
          linux_amd64="llm-usage_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
          linux_arm64="llm-usage_${GITHUB_REF_NAME}_linux_arm64.tar.gz"

          darwin_amd64_sha="$(sha256sum "dist/${darwin_amd64}" | cut -d ' ' -f 1)"
          darwin_arm64_sha="$(sha256sum "dist/${darwin_arm64}" | cut -d ' ' -f 1)"
          linux_amd64_sha="$(sha256sum "dist/${linux_amd64}" | cut -d ' ' -f 1)"
          linux_arm64_sha="$(sha256sum "dist/${linux_arm64}" | cut -d ' ' -f 1)"

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/llm-usage.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file was generated by llm-usage release workflow. DO NOT EDIT.
          class LlmUsage < Formula
            desc "Simple local usage report for Pi, Codex CLI, Claude Code, and OpenCode"
            homepage "https://github.com/rselbach/llm-usage"
            version "${version}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${release_base}/${darwin_amd64}"
                sha256 "${darwin_amd64_sha}"
              end

              if Hardware::CPU.arm?
                url "${release_base}/${darwin_arm64}"
                sha256 "${darwin_arm64_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${release_base}/${linux_amd64}"
                sha256 "${linux_amd64_sha}"
              end

              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${release_base}/${linux_arm64}"
                sha256 "${linux_arm64_sha}"
              end
            end

            def install
              bin.install "llm-usage"
            end

            test do
              assert_match "Usage Report", shell_output("#{bin}/llm-usage --no-pricing --duration 1s")
            end
          end
          FORMULA

      - name: Commit formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --short -- Formula/llm-usage.rb)" ]]; then
            printf 'Formula is already up to date\n'
            exit 0
          fi

          git add Formula/llm-usage.rb
          git commit -m "Update llm-usage to ${GITHUB_REF_NAME}"
          git push
